[EMC]
VERSION = 1.1
MACHINE = lcnc-suite Sim
DEBUG = 0

[DISPLAY]
DISPLAY = lcnc-suite
OPEN_FILE = ~/linuxcnc/nc_files/blank.ngc
CONFIRM_EXIT = False

# ─────────────────────────────────────────────────────────────────────
# lcnc-suite gateway settings
# ─────────────────────────────────────────────────────────────────────
# All variables below are read by the launcher (lcnc-suite bash script)
# and exported as environment variables to the Python gateway. Any
# setting can be overridden at launch time by setting the matching env
# var (e.g. `LCNC_WEBUI_HOST=127.0.0.1 lcnc-suite ...`).

# ── Network / browser ────────────────────────────────────────────────
# WEBUI_HOST: 0.0.0.0 to accept LAN connections (recommended for shop
#   floor / multi-monitor setups), 127.0.0.1 to lock to local machine.
WEBUI_HOST = 0.0.0.0

# WEBUI_PORT: HTTP/WebSocket port. Browser UI lives at http://HOST:PORT/.
WEBUI_PORT = 8000

# WEBUI_BROWSER: 1 = auto-open the OS default browser to the UI on start.
#   0 = no auto-launch (typical for headless / kiosk / multi-tab setups
#   where you'll open browsers manually).
WEBUI_BROWSER = 1

# WEBUI_DEV: 1 = launch Vite dev server on :5173 alongside the gateway,
#   browser opens to :5173 with hot-reload (frontend-development only —
#   adds a WS proxy hop and is materially less reliable under load than
#   prod-mode). 0 = production mode, gateway serves the prebuilt dist/
#   directly. Always 0 for shop-floor / production use.
WEBUI_DEV = 0

# ── Gateway performance / behavior flags ─────────────────────────────

# WEBUI_STATUS_DELTA: 0 | 1
#   Send only fields that changed since the previous status frame
#   (delta encoding). Saves bandwidth when one client is connected,
#   but breaks the shared-msgpack-encode optimization that benefits
#   multi-client fan-out. Recommendation:
#     • 1–5 active clients  → 1 (delta on, bandwidth-optimal)
#     • 6+ active clients   → 0 (delta off, encode-cost-optimal)
#   Default in code: 0.
WEBUI_STATUS_DELTA = 1

# WEBUI_ADAPTIVE_POLL: 0 | 1
#   Drop the gateway's status poll rate to WEBUI_IDLE_POLL_HZ when the
#   machine is idle (interp_state=IDLE, no jog active). Resumes 30 Hz
#   automatically once motion starts. Recommended ON for SBCs / VMs
#   where idle CPU matters; harmless on capable hardware.
WEBUI_ADAPTIVE_POLL = 1

# WEBUI_IDLE_POLL_HZ: integer Hz (1–30)
#   Idle-state poll rate when WEBUI_ADAPTIVE_POLL=1. Only read when
#   adaptive poll is on. 5 Hz is comfortable for the DRO at idle.
WEBUI_IDLE_POLL_HZ = 5

# WEBUI_UVLOOP: 0 | 1
#   Swap asyncio's default event loop for uvloop (libuv-based, faster
#   in some socket-heavy benchmarks). Situational — only meaningful
#   under genuine load. 0 keeps the stdlib loop, which is more
#   predictable and what most diagnostics assume.
WEBUI_UVLOOP = 0

# WEBUI_WIRE_FORMAT: json | msgpack
#   WebSocket encoding for status frames. msgpack is more compact for
#   numeric-heavy payloads; json is human-readable in browser
#   DevTools → Network tab. msgpack is the default; flip to json only
#   for live debugging.
WEBUI_WIRE_FORMAT = msgpack

# WEBUI_WS_INIT_CONCURRENCY: integer (1–32)
#   Caps how many WebSocket clients can perform their initialization
#   handshake (ws.accept + viewer_init send + settings load) in
#   parallel. The lever for cold-start CPU smoothing in multi-tab
#   setups.
#
#   Why it matters: when N tabs reload simultaneously they all hit
#   the gateway at the same instant. Each handshake costs ~30 ms of
#   CPU work. Without a cap, N=12 tabs cold-starting in lockstep can
#   spike the asyncio loop into kernel-TCP saturation and starve the
#   heartbeat task → HAL safety chain trips on a healthy gateway.
#
#   Recommendation:
#     • 1–3 expected tabs:          20 (default, no throttling)
#     • 4–8 expected tabs:          4
#     • 9+ expected tabs (storm):   2
#
#   Trade-off: lower values mean later-arriving tabs wait their turn
#   (~30 ms × queue depth). At 2, the 12th tab is fully ready ~300 ms
#   after the 1st — imperceptible in practice, but flattens the CPU
#   peak that triggers false safety trips.
WEBUI_WS_INIT_CONCURRENCY = 20

# ── Camera (optional MJPEG stream for tool/fixture monitoring) ───────
# Uncomment to enable; gateway adds /camera/stream + /camera/status.
# CAMERA_SOURCE: USB device index (0, 1) or RTSP/HTTP URL
#   ("rtsp://host/live", "http://host/mjpeg"). Empty = camera disabled.
# CAMERA_RESOLUTION: WxH (USB only; ignored for network sources)
# CAMERA_FPS: stream frame rate (1–60)
# CAMERA_SOURCE     = 0
# CAMERA_RESOLUTION = 1280x720
# CAMERA_FPS        = 15

DEBUG = 0
MAX_FEED_OVERRIDE = 2.0
MAX_SPINDLE_OVERRIDE = 2.0
MIN_SPINDLE_OVERRIDE = 0.5
DEFAULT_SPINDLE_SPEED = 300
DEFAULT_LINEAR_VELOCITY = 25
MAX_LINEAR_VELOCITY = 80
MIN_LINEAR_VELOCITY = 0.1
DEFAULT_ANGULAR_VELOCITY = 5
MAX_ANGULAR_VELOCITY = 10
MIN_ANGULAR_VELOCITY = 1
PROGRAM_PREFIX = ~/linuxcnc/nc_files
INCREMENTS = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
GEOMETRY = XYZ

[FILTER]
PROGRAM_EXTENSION = .nc,.txt,.tap Other NC files

[RS274NGC]
RS274NGC_STARTUP_CODE = F100 S50 G21 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G92.1 G94 G97 G98
PARAMETER_FILE = sim.var
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
# Adjust paths below to where you cloned lcnc-suite
SUBROUTINE_PATH = ~/lcnc-suite/subroutines/probe_basic:~/lcnc-suite/subroutines/tool_length_probe:~/lcnc-suite/subroutines/surfacemap
ON_ABORT_COMMAND = O<on_abort> call
REMAP=M600 modalgroup=6 ngc=m600
REMAP=M601 modalgroup=6 ngc=m601
USER_M_PATH = ./
FEATURES = 12

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 100000
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[HAL]
HALFILE = hallib/core_sim_3.hal
HALFILE = hallib/spindle_sim.hal
HALFILE = hallib/simulated_home_probe_basic.hal
HALFILE = hallib/sim_cannon.hal
HALFILE = hallib/lcnc_webui.hal
HALUI = halui
TWOPASS = on

[HALUI]
HALUI = halui

[TRAJ]
AXES = 3
SPINDLES = 1
COORDINATES = X Y Z
HOME = 0 0 0 0 0
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 50
MAX_LINEAR_VELOCITY = 100

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[KINS]
KINEMATICS = trivkins coordinates=XYZ
JOINTS = 3

#==================
#      X Axis
#==================

[AXIS_X]
MIN_LIMIT = -0.1
MAX_LIMIT = 685
MAX_VELOCITY = 100
MAX_ACCELERATION = 750

[JOINT_0]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 100
MAX_ACCELERATION = 750
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -0.1
MAX_LIMIT = 685
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 100
HOME_LATCH_VEL = 5
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 1
HOME_IS_SHARED = 1

#==================
#      Y Axis
#==================

[AXIS_Y]
MIN_LIMIT = -0.1
MAX_LIMIT = 705
MAX_VELOCITY = 100
MAX_ACCELERATION = 750

[JOINT_1]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 100
MAX_ACCELERATION = 750
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -0.1
MAX_LIMIT = 705
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 100
HOME_LATCH_VEL = 5
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 1
HOME_IS_SHARED = 1

#==================
#      Z Axis
#==================

[AXIS_Z]
MIN_LIMIT = -190
MAX_LIMIT = 0.10
MAX_VELOCITY = 80
MAX_ACCELERATION = 750
OFFSET_AV_RATIO = 0.2       # smoothing for surface compensation Z offsets (LinuxCNC built-in)

[JOINT_2]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 80
MAX_ACCELERATION = 750
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -190
MAX_LIMIT = 0.1
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 1.0
HOME_SEARCH_VEL = 100
HOME_LATCH_VEL = 5
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 0
HOME_IS_SHARED = 1

#==================
#     Spindle
#==================

[SPINDLE_0]
MAX_FORWARD_VELOCITY = 3000
INCREMENT = 100
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0
FF2 = 0
BIAS = 0
DEADBAND = 0
MAX_OUTPUT = 2000
